<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veux-tu encore continuer de me parler ?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #ff4f81;
      --red: #ff1744;
      --soft: #fff0f5;
      --dark: #1a0010;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      overflow: hidden;
      background: linear-gradient(-45deg, #ff4f81, #ff6ba9, #ff1744, #c2185b);
      background-size: 400% 400%;
      animation: gradientShift 4s ease infinite;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.95);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 5vw, 3.5rem);
      color: white;
      text-align: center;
      text-shadow: 0 4px 30px rgba(0,0,0,0.3);
      margin-bottom: 3rem;
      line-height: 1.3;
      animation: fadeSlideIn 0.8s ease forwards;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .btn-group {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeSlideIn 0.8s 0.3s ease both;
    }

    .btn {
      font-family: 'Space Mono', monospace;
      font-size: 1.2rem;
      font-weight: 700;
      padding: 1rem 2.5rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.2);
      transform: translateX(-101%);
      transition: transform 0.3s;
    }

    .btn:hover::before { transform: translateX(0); }

    .btn-yes {
      background: white;
      color: var(--pink);
      box-shadow: 0 8px 40px rgba(255,26,68,0.4);
    }

    .btn-yes:hover { transform: scale(1.05); }

    .btn-no {
      background: transparent;
      color: white;
      border: 3px solid white;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    }

    .btn-no:hover {
      background: white;
      color: var(--pink);
      transform: scale(1.05);
    }

    .heart {
      position: fixed;
      font-size: 1.5rem;
      pointer-events: none;
      animation: floatUp 2s ease forwards;
      z-index: 10;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
    }

    /* ---- Final Screen ---- */
    #screen-final h1 {
      font-size: clamp(1.4rem, 4vw, 2.8rem);
      animation: fadeSlideIn 0.8s ease both;
    }

    .big-goodbye {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 10vw, 7rem);
      color: white;
      text-shadow: 0 8px 60px rgba(255,26,68,0.6);
      margin: 1rem 0 2.5rem;
      animation: fadeSlideIn 0.8s 0.4s ease both, pulseGoodbye 2s 1.2s infinite ease-in-out;
    }

    @keyframes pulseGoodbye {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .bottle {
      max-width: 280px;
      width: 80vw;
      border-radius: 20px;
      box-shadow: 0 20px 80px rgba(0,0,0,0.4);
      animation: fadeSlideIn 1s 0.8s ease both, bottleFloat 3s 1.8s infinite ease-in-out;
    }

    @keyframes bottleFloat {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-15px) rotate(2deg); }
    }

    .timer-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 4px;
      background: white;
      box-shadow: 0 0 20px rgba(255,255,255,0.8);
      transition: width 0.1s linear;
      z-index: 100;
    }

    .timer-bar.hidden { display: none; }

    .progress-text {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.7);
      font-family: 'Space Mono', monospace;
      z-index: 100;
      transition: opacity 0.3s;
    }
  </style>
</head>

    <h1>Veux-tu encore continuer<br>de me parler ?</h1>
    <div class="btn-group">

      <button class="btn btn-no" id="btn-no">Non 😔</button>
    </div>
  </div>

  <div class="timer-bar hidden" id="timer-bar"></div>
  <div class="progress-text hidden" id="progress-text"></div>

  <script>
    const TIMEOUT = 15000;
    const btnYes = document.getElementById('btn-yes');
    const btnNo = document.getElementById('btn-no');
    const screenStart = document.getElementById('screen-start');
    const screenFinal = document.getElementById('screen-final');
    const timerBar = document.getElementById('timer-bar');
    const progressText = document.getElementById('progress-text');

    let startTime = Date.now();
    let timeoutId;
    let rafId;

    // ---- Yes button runs away ----
    function moveButton(e) {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const w = btnYes.offsetWidth;
      const h = btnYes.offsetHeight;
      let x = Math.random() * (vw - w);
      let y = Math.random() * (vh - h);

      // Keep at least 80px from mouse
      if (e) {
        const mx = e.clientX, my = e.clientY;
        const dist = () => Math.hypot(x + w/2 - mx, y + h/2 - my);
        let attempts = 0;
        while (dist() < 120 && attempts < 30) {
          x = Math.random() * (vw - w);
          y = Math.random() * (vh - h);
          attempts++;
        }
      }

      btnYes.style.position = 'fixed';
      btnYes.style.left = x + 'px';
      btnYes.style.top = y + 'px';
      btnYes.style.right = 'auto';
      btnYes.style.bottom = 'auto';
    }

    function spawnHeart(x, y) {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.textContent = ['💗','💖','💕','❤️','💓'][Math.floor(Math.random()*5)];
      heart.style.left = (x + Math.random()*40 - 20) + 'px';
      heart.style.top = (y + Math.random()*40 - 20) + 'px';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 2000);
    }

    function onPointerMove(e) {
      moveButton(e);
      if (Math.random() < 0.05) spawnHeart(e.clientX, e.clientY);
    }

    btnYes.addEventListener('mouseenter', () => {
      document.addEventListener('mousemove', onPointerMove);
    });

    btnYes.addEventListener('touchstart', (e) => {
      e.preventDefault();
      onPointerMove(e.touches[0]);
      document.addEventListener('touchmove', onPointerMoveT);
    });

    function onPointerMoveT(e) {
      onPointerMove(e.touches[0]);
    }

    // ---- Go to final ----
    function goFinal() {
      screenStart.classList.add('hidden');
      screenFinal.classList.remove('hidden');
      cancelAnimationFrame(rafId);
      clearTimeout(timeoutId);
      document.removeEventListener('mousemove', onPointerMove);
    }

    // ---- Timer bar & progress ----
    function tick() {
      const elapsed = Date.now() - startTime;
      const pct = Math.min(elapsed / TIMEOUT, 1);
      const remaining = Math.max(0, Math.ceil((TIMEOUT - elapsed) / 1000));
      timerBar.style.width = (pct * 100) + '%';
      progressText.textContent = remaining + 's';
      if (elapsed < TIMEOUT) { 
        rafId = requestAnimationFrame(tick);
      }
    }

    function startTimer() {
      startTime = Date.now();
      timerBar.classList.remove('hidden');
      progressText.classList.remove('hidden');
      tick();
      timeoutId = setTimeout(goFinal, TIMEOUT);
    }

    // ---- Init ----
    btnYes.addEventListener('click', goFinal);
    btnNo.addEventListener('click', goFinal);
    startTimer();

    // Hearts everywhere
    document.addEventListener('click', (e) => {
      for (let i = 0; i < 3; i++) {
        setTimeout(() => spawnHeart(e.clientX, e.clientY), i * 80);
      }
    });
  </script>
